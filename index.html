<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel With Ankur</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
  background:linear-gradient(135deg,#141e30,#243b55);
  color:#fff;
}

/* HEADER */
header{
  background:linear-gradient(135deg,#ff7e5f,#feb47b);
  padding:20px;
  text-align:center;
}

/* SEARCH + PLAN */
.search-box{
  padding:15px;
  text-align:center;
}
.search-box input{
  width:60%;
  padding:10px;
  border-radius:10px;
  border:none;
}
.btn{
  padding:10px 14px;
  background:#ff7e5f;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-left:10px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:#1e2a38;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}
.card:hover{transform:scale(1.03);}

.card img{width:100%;height:200px;object-fit:cover;}
.card-content{padding:15px;}

.highlight{
  border:2px solid #00ffcc;
  box-shadow:0 0 20px #00ffcc;
}

.distance{font-size:14px;margin-top:5px;}

/* MODAL */
#planner{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000000dd;
  display:none;
}

.plan-box{
  background:#1e2a38;
  margin:40px auto;
  padding:20px;
  width:90%;
  max-width:500px;
  border-radius:15px;
}

.close{
  float:right;
  cursor:pointer;
  font-size:20px;
}

select{
  width:100%;
  padding:8px;
  margin:10px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<header>
<h1>🌍 Travel With Ankur</h1>
<p>AI Smart Travel Planner</p>
</header>

<div class="search-box">
<input type="text" id="search" placeholder="Search places..." onkeyup="filterPlaces()">
<button class="btn" onclick="openPlan()">🧠 Plan Trip</button>
</div>

<div id="places" class="container">

<!-- SAME YOUR CARDS (NO CHANGE BUTTONS) -->

<div class="card" data-name="rishikesh" data-lat="30.0869" data-lng="78.2676">
<img src="https://image2url.com/r2/default/images/1774727323903-1783ba6e-b91f-4119-9d8f-64af497cad5e.jpg">
<div class="card-content">
<h2>Rishikesh</h2>
<p class="distance">📍 Calculating...</p>
<div class="btn" onclick="window.location.href='risk.html'">View Details</div>
</div>
</div>

<div class="card" data-name="manali" data-lat="32.2432" data-lng="77.1892">
<img src="https://image2url.com/r2/default/images/1774727231220-ae00ef34-fde1-41a4-80b4-fa4ff2e40bfa.jfif">
<div class="card-content">
<h2>Manali</h2>
<p class="distance">📍 Calculating...</p>
<div class="btn" onclick="window.location.href='manali.html'">View Details</div>
</div>
</div>

<div class="card" data-name="shimla" data-lat="31.1048" data-lng="77.1734">
<img src="https://image2url.com/r2/default/images/1774727094251-c65f7679-fafb-4192-953c-9d4534b3e1d3.jpg">
<div class="card-content">
<h2>Shimla</h2>
<p class="distance">📍 Calculating...</p>
<div class="btn" onclick="window.location.href='shimla.html'">View Details</div>
</div>
</div>

<div class="card" data-name="delhi" data-lat="28.6139" data-lng="77.2090">
<img src="https://image2url.com/r2/default/images/1775121272893-8e4fa1a4-25b0-48a7-b02e-bcda2bba78b6.jpg">
<div class="card-content">
<h2>Delhi</h2>
<p class="distance">📍 Calculating...</p>
<div class="btn" onclick="window.location.href='delhi.html'">View Details</div>
</div>
</div>

<div class="card" data-name="vrindavan mathura" data-lat="27.4924" data-lng="77.6737">
<img src="https://image2url.com/r2/default/images/1775121221830-808a5fb8-7d65-4302-82bc-726ef57af638.jfif">
<div class="card-content">
<h2>Vrindavan & Mathura</h2>
<p class="distance">📍 Calculating...</p>
<div class="btn" onclick="window.location.href='vrind.html'">View Details</div>
</div>
</div>

</div>

<!-- PLANNER -->
<div id="planner">
<div class="plan-box">
<span class="close" onclick="closePlan()">❌</span>

<h2 id="planTitle"></h2>

<label>Days:</label>
<select id="days">
<option>1</option>
<option>2</option>
<option selected>3</option>
<option>4</option>
<option>5</option>
</select>

<label>Budget:</label>
<select id="budget">
<option>Low</option>
<option selected>Medium</option>
<option>Luxury</option>
</select>

<button class="btn" onclick="generatePlan()">Generate Plan</button>

<div id="planContent" style="margin-top:15px;"></div>

</div>
</div>

<script>

let nearestPlace="Delhi";

// FILTER
function filterPlaces(){
  let input=document.getElementById("search").value.toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display=c.dataset.name.includes(input)?"block":"none";
  });
}

// LOCATION
navigator.geolocation.getCurrentPosition(pos=>{
  let uLat=pos.coords.latitude;
  let uLng=pos.coords.longitude;

  let cards=document.querySelectorAll(".card");
  let arr=[];

  cards.forEach(c=>{
    let lat=parseFloat(c.dataset.lat);
    let lng=parseFloat(c.dataset.lng);

    let d=getDistance(uLat,uLng,lat,lng)*1.25;
    let eta=(d/40)*60;

    c.querySelector(".distance").innerText =
      `📍 ${d.toFixed(0)} km | ⏱️ ${eta.toFixed(0)} min`;

    arr.push({card:c,dist:d});
  });

  arr.sort((a,b)=>a.dist-b.dist);

  nearestPlace=arr[0].card.querySelector("h2").innerText;

  let container=document.getElementById("places");
  arr.forEach(p=>container.appendChild(p.card));

  arr[0].card.classList.add("highlight");
});

// DISTANCE
function getDistance(lat1,lon1,lat2,lon2){
  let R=6371;
  let dLat=(lat2-lat1)*Math.PI/180;
  let dLon=(lon2-lon1)*Math.PI/180;

  let a=Math.sin(dLat/2)**2+
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;

  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// OPEN
function openPlan(){
  document.getElementById("planner").style.display="block";
  document.getElementById("planTitle").innerText=nearestPlace+" Smart Plan";
}

// GENERATE PLAN
function generatePlan(){
  let days=document.getElementById("days").value;
  let budget=document.getElementById("budget").value;

  let content=`Plan for ${nearestPlace}\n(${days} Days | ${budget} Budget)\n\n`;

  for(let i=1;i<=days;i++){
    content+=`Day ${i}: Explore top attractions, local food & experiences.\n`;
  }

  content+=`\nBudget Tip: ${budget==="Low"?"Use public transport & budget hotels":
    budget==="Medium"?"Mix of comfort + savings":"Luxury hotels & private cabs"}`;

  document.getElementById("planContent").innerText=content;
}

// CLOSE
function closePlan(){
  document.getElementById("planner").style.display="none";
}

</script>

</body>
</html>
