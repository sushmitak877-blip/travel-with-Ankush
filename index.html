<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel With Ankur</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{background:#f5f7fa;overflow-x:hidden;}

/* PAGE SYSTEM */
.page{
  position:absolute;
  width:100%;
  min-height:100vh;
  left:100%;
  top:0;
  background:#f5f7fa;
  transition:0.5s;
}
.active{left:0;}

/* HEADER */
header{
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:white;
  padding:20px;
  text-align:center;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.card img{width:100%;height:200px;object-fit:cover;}
.card-content{padding:15px;}
.btn{
  display:inline-block;
  margin-top:10px;
  padding:8px 12px;
  background:#0072ff;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* BACK */
.back{
  margin:10px;
  display:inline-block;
  color:#0072ff;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">

<header>
<h1>🌍 Travel With Ankur</h1>
<p>Explore Best Places</p>
</header>

<div class="container">

<div class="card">
<img src="https://image2url.com/r2/default/images/1774727323903-1783ba6e-b91f-4119-9d8f-64af497cad5e.jpg">
<div class="card-content">
<h2>Rishikesh</h2>
<div class="btn" onclick="window.location.href='risk.html'">View Details</div>
</div>
</div>

<div class="card">
<img src="https://image2url.com/r2/default/images/1774727231220-ae00ef34-fde1-41a4-80b4-fa4ff2e40bfa.jfif">
<div class="card-content">
<h2>Manali</h2>
<div class="btn" onclick="window.location.href='manali.html'">View Details</div>
</div>
</div>

<!-- SHIMLA -->
  <div class="card">
    <img src="https://image2url.com/r2/default/images/1774727094251-c65f7679-fafb-4192-953c-9d4534b3e1d3.jpg">
    <div class="card-content">
      <h2>Shimla</h2>
      <div class="btn" onclick="window.location.href='shimla.html'">View Details</div>
</div>
</div>

<div class="card">
<img src="https://image2url.com/r2/default/images/1775121272893-8e4fa1a4-25b0-48a7-b02e-bcda2bba78b6.jpg" alt="image" />
<div class="card-content">
<h2>Delhi</h2>
<div class="btn" onclick="window.location.href='delhi.html'">View Details</div>
</div>
</div>

<!-- Vrindavan, Mathura -->
  <div class="card">
    <img src="https://image2url.com/r2/default/images/1775121221830-808a5fb8-7d65-4302-82bc-726ef57af638.jfif" alt="image" />
    <div class="card-content">
      <h2>Vrindavan & Mathura</h2>
      <div class="btn" onclick="window.location.href='vrind.html'">View Details</div>
</div>
</div>

<script>
function openPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goBack(){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("home").classList.add("active");
}

function getRoute(){
  var from=document.getElementById('from').value;
  window.open("https://www.google.com/maps/dir/"+from+"/Rishikesh");
}
</script>

</body>
</html>
