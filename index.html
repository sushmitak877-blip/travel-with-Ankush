<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel With Ankur</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
  background: linear-gradient(rgba(10,15,25,0.7), rgba(10,15,25,0.9)),
  url('https://image2url.com/r2/default/images/1775671877256-112e9310-af8e-4988-b901-edae930a62f4.png');
  background-size:cover;
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 20px;
  background: rgba(0,0,0,0.5);
}

.logo{
  width:50px;height:50px;border-radius:50%;
}

.title{flex:1;text-align:center;}
.title h1{color:#00f2fe;font-size:24px;}

#userSection{text-align:right;}

/* SEARCH */
.search-box{text-align:center;padding:15px;}
.search-box input{
  width:60%;padding:12px;border-radius:20px;border:none;
}

/* BUTTON */
.btn{
  padding:10px 15px;border:none;border-radius:20px;
  background:#00f2fe;color:#000;cursor:pointer;margin-top:5px;
}

/* CARDS */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;padding:20px;
}

.card{
  background:rgba(0,0,0,0.6);
  border-radius:10px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{transform:scale(1.03);}

.card img{width:100%;height:180px;object-fit:cover;}
.card-content{padding:10px;}

.highlight{
  border:2px solid #00ffcc;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<img src="https://image2url.com/r2/default/images/1775671877256-112e9310-af8e-4988-b901-edae930a62f4.png" class="logo">

<div class="title">
<h1>Eat With Travel</h1>
</div>

<div id="userSection">
<button class="btn" onclick="login()">Login</button>
</div>
</div>

<!-- SEARCH -->
<div class="search-box">
<input type="text" id="search" placeholder="Search places..." onkeyup="filterPlaces()">
</div>

<!-- CARDS -->
<div class="container" id="places">

<div class="card" data-name="rishikesh" data-lat="30.0869" data-lng="78.2676">
<img src="https://image2url.com/r2/default/images/1774727323903-1783ba6e-b91f-4119-9d8f-64af497cad5e.jpg">
<div class="card-content">
<h2>Rishikesh</h2>
<p class="distance">📍 Calculating...</p>
<p class="weather">🌦️ Loading...</p>
<button class="btn" onclick="goDetails('risk.html')">View Details</button>
</div>
</div>

<div class="card" data-name="manali" data-lat="32.2432" data-lng="77.1892">
<img src="https://image2url.com/r2/default/images/1774727231220-ae00ef34-fde1-41a4-80b4-fa4ff2e40bfa.jfif">
<div class="card-content">
<h2>Manali</h2>
<p class="distance">📍 Calculating...</p>
<p class="weather">🌦️ Loading...</p>
<button class="btn" onclick="goDetails('manali.html')">View Details</button>
</div>
</div>

<div class="card" data-name="delhi" data-lat="28.6139" data-lng="77.2090">
<img src="https://image2url.com/r2/default/images/1775121272893-8e4fa1a4-25b0-48a7-b02e-bcda2bba78b6.jpg">
<div class="card-content">
<h2>Delhi</h2>
<p class="distance">📍 Calculating...</p>
<p class="weather">🌦️ Loading...</p>
<button class="btn" onclick="goDetails('delhi.html')">View Details</button>
</div>
</div>

</div>

<!-- SCRIPT -->
<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, increment } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDOVKe2NJN1ULlQpKKP7AC848psUkzXwXQ",
  authDomain: "travel-with-ankur.firebaseapp.com",
  projectId: "travel-with-ankur",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// LOGIN
window.login = async ()=>{
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  saveUser(result.user);
};

// LOGOUT
window.logout = ()=> signOut(auth);

// SAVE USER
async function saveUser(user){
  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{
      name:user.displayName,
      email:user.email,
      visits:1
    });
  }else{
    await updateDoc(ref,{
      visits: increment(1)
    });
  }
}

// SHOW USER
onAuthStateChanged(auth, async user=>{
  const section = document.getElementById("userSection");

  if(user){
    const ref = doc(db,"users",user.uid);
    const snap = await getDoc(ref);
    const data = snap.data();

    section.innerHTML = `
      👋 ${data.name}<br>
      Visits: ${data.visits}<br>
      <button class="btn" onclick="logout()">Logout</button>
    `;
  }else{
    section.innerHTML = `<button class="btn" onclick="login()">Login</button>`;
  }
});

/* ================= WEATHER ================= */
async function getWeather(lat,lng){
  try{
    let res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
    let data = await res.json();
    return `🌤️ ${data.current_weather.temperature}°C`;
  }catch{
    return "N/A";
  }
}

/* ================= DISTANCE ================= */
function getDistance(lat1,lon1,lat2,lon2){
  let R=6371;
  let dLat=(lat2-lat1)*Math.PI/180;
  let dLon=(lon2-lon1)*Math.PI/180;
  let a=Math.sin(dLat/2)**2+
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ================= LOCATION ================= */
navigator.geolocation.getCurrentPosition(async pos=>{
  let uLat=pos.coords.latitude;
  let uLng=pos.coords.longitude;

  let cards=document.querySelectorAll(".card");
  let arr=[];
  let promises=[];

  cards.forEach(c=>{
    let lat=parseFloat(c.dataset.lat);
    let lng=parseFloat(c.dataset.lng);

    let d=getDistance(uLat,uLng,lat,lng);
    c.querySelector(".distance").innerText=`📍 ${d.toFixed(0)} km`;

    promises.push(
      getWeather(lat,lng).then(w=>{
        c.querySelector(".weather").innerText=w;
      })
    );

    arr.push({card:c,dist:d});
  });

  await Promise.all(promises);

  arr.sort((a,b)=>a.dist-b.dist);

  let container=document.getElementById("places");
  arr.forEach(p=>container.appendChild(p.card));

  arr[0].card.classList.add("highlight");

}, ()=>{
  alert("Location permission denied ❌");
});

/* ================= PROTECT ================= */
window.goDetails = function(page){
  if(auth.currentUser){
    window.location.href = page;
  }else{
    alert("Please login first 🔐");
  }
};

/* ================= SEARCH ================= */
window.filterPlaces = function(){
  let input=document.getElementById("search").value.toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display=c.dataset.name.includes(input)?"block":"none";
  });
};

</script>

</body>
</html>
