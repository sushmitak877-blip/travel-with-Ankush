/* ROUTE DATA */
function getRouteData(lat,lng){
if(!userLat) return null;

// Haversine Formula (fast distance calc)
function getDistance(lat1, lon1, lat2, lon2){
const R = 6371;
const dLat = (lat2-lat1) * Math.PI/180;
const dLon = (lon2-lon1) * Math.PI/180;

const a =
Math.sin(dLat/2) * Math.sin(dLat/2) +
Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
Math.sin(dLon/2) * Math.sin(dLon/2);

const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
return R * c;
}

let dist = getDistance(userLat,userLng,lat,lng).toFixed(1);

// assume avg speed 35 km/h
let time = ((dist/35)*60).toFixed(0);

return {dist,time};
}

/* MAP */
const map=L.map('map').setView([26.63,92.79],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* LOCATION */
function getLocation(){
navigator.geolocation.watchPosition(pos=>{
userLat=pos.coords.latitude;
userLng=pos.coords.longitude;

document.getElementById("status").innerText="📍 Live Location Active";

if(userMarker) map.removeLayer(userMarker);
userMarker=L.circleMarker([userLat,userLng],{radius:8,color:"blue"}).addTo(map);

map.setView([userLat,userLng],13);
render();
});
}

/* OPEN/CLOSE LOGIC */
function isOpenNow(timing){
if(!timing || timing.includes("24")) return true;

let now=new Date();
let current=now.getHours()*60 + now.getMinutes();

let parts=timing.split("-");
if(parts.length<2) return true;

function convert(t){
let [time,ampm]=t.trim().split(" ");
let [h,m]=time.split(":").map(Number);
if(ampm==="PM" && h!==12) h+=12;
if(ampm==="AM" && h===12) h=0;
return h*60+m;
}

let start=convert(parts[0]);
let end=convert(parts[1]);

return current>=start && current<=end;
}

/* RENDER */
async function render(){

let search=document.getElementById("search").value.toLowerCase();
let filter=document.getElementById("filter").value;

let filtered=places.filter(p=>{
return p.name.toLowerCase().includes(search) && (filter==="all"||p.type===filter);
});

let enriched=[];
for(let p of filtered){
let r=getRouteData(p.lat,p.lng);
enriched.push({...p,dist:r?r.dist:null,travelTime:r?r.time:null});
}

enriched.sort((a,b)=>(a.dist||999)-(b.dist||999));
nearestPlaces=enriched.slice(0,5).map(p=>p.name);

function makeCard(p){

let isNear=nearestPlaces.includes(p.name);
let open=isOpenNow(p.time);

return `
<div class="card ${isNear?'highlight':''}">
<img src="${p.img}">
<div class="card-content">

<h3>${isNear?'🔥 ':''}${p.name}</h3>
<p class="desc">${p.desc}</p>

<div class="info">
📍 ${p.dist||"..."} km away<br>
⏱ Travel Time: ${p.travelTime||"..."} min<br>
💸 ${p.fare}<br>
🕒 ${p.time}<br>
${open ? "🟢 Open Now" : "🔴 Closed"}
</div>

<div class="btn-group">

<button class="btn hotel" 
onclick="window.open('https://www.google.com/maps/search/hotels/@${p.lat},${p.lng},15z')">
🏨 Hotels</button>

<button class="btn food" 
onclick="window.open('https://www.google.com/maps/search/restaurants/@${p.lat},${p.lng},15z')">
🍽️ Food</button>

<button class="btn bus" 
onclick="window.open('https://www.google.com/maps/search/bus+stop/@${p.lat},${p.lng},15z')">
🚌 Bus</button>

<button class="btn train" 
onclick="window.open('https://www.google.com/maps/search/railway+station/@${p.lat},${p.lng},15z')">
🚆 Train</button>

<button class="btn direction" 
onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}')">
🗺️ Map</button>

</div>

</div>
</div>`;
}

document.getElementById("cards").innerHTML=enriched.map(makeCard).join("");
}

document.getElementById("search").addEventListener("input",render);
document.getElementById("filter").addEventListener("change",render);

getLocation();
</script>
