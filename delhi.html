<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delhi Smart Guide Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#f5f7fa;padding-bottom:80px;}

header{
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;text-align:center;padding:18px;
transition:0.3s;
}
header.shrink{padding:10px;}

.searchbar{
position:sticky;top:10px;z-index:999;
background:white;margin:10px;padding:12px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
display:flex;flex-wrap:wrap;gap:10px;
}

input,select{
padding:10px;border-radius:10px;border:1px solid #ccc;
}

button{
padding:8px 10px;border:none;
background:#2a5298;color:white;
border-radius:8px;cursor:pointer;
}

#map{height:280px;margin:10px;border-radius:15px;}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;padding:15px;
}

.card{
background:white;border-radius:15px;overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}
.card:hover{transform:translateY(-8px) scale(1.02);}

.card img{width:100%;height:170px;object-fit:cover;}

.card-content{padding:12px;}

.desc{
font-size:15px;
line-height:1.6;
color:#444;
margin-top:8px;
}

.bottom-nav{
position:fixed;bottom:0;width:100%;
background:white;display:flex;justify-content:space-around;
padding:12px;
box-shadow:0 -2px 15px rgba(0,0,0,0.2);
}
.bottom-nav button{background:none;color:#2a5298;font-weight:bold;}
</style>
</head>

<body>

<header>
<h1>Delhi Smart Tourist Guide</h1>
<p id="topDistance">📍 Detecting location...</p>
</header>

<div class="searchbar">
<input type="text" id="search" placeholder="Search place...">
<select id="filter">
<option value="all">All</option>
<option value="tourist">Tourist</option>
<option value="restaurant">Restaurant</option>
<option value="cafe">Cafe</option>
</select>
<button onclick="getLocation()">📍</button>
</div>

<div id="map"></div>
<div class="cards" id="cards"></div>

<div class="bottom-nav">
<button onclick="window.scrollTo({top:0,behavior:'smooth'})">🏠</button>
<button onclick="getLocation()">📍</button>
<button onclick="document.getElementById('search').focus()">🔍</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let userLat=null,userLng=null,userMetro=null;

// 🚇 METRO
const metros=[
{name:"Rajiv Chowk",lat:28.6330,lng:77.2197,line:"Blue/Yellow"},
{name:"Central Secretariat",lat:28.6143,lng:77.2119,line:"Yellow/Violet"},
{name:"Kashmere Gate",lat:28.6675,lng:77.2280,line:"Red/Yellow/Violet"},
{name:"Lal Qila",lat:28.6561,lng:77.2408,line:"Violet"},
{name:"Qutub Minar",lat:28.5129,lng:77.1863,line:"Yellow"}
];

// 📍 50+ PLACES (SHORT SAMPLE — YOU CAN KEEP ADDING SAME FORMAT)
const places=[
{name:"India Gate",lat:28.6129,lng:77.2295,img:"https://upload.wikimedia.org/wikipedia/commons/d/da/India_Gate_in_New_Delhi_03-2016.jpg",desc:"Iconic war memorial surrounded by lush gardens, perfect for evening walks and photography.",type:"tourist"},
{name:"Red Fort",lat:28.6562,lng:77.2410,img:"https://upload.wikimedia.org/wikipedia/commons/4/47/Red_Fort_in_New_Delhi_03-2016.jpg",desc:"Historic Mughal fort showcasing India's rich heritage and architectural brilliance.",type:"tourist"},
{name:"Lotus Temple",lat:28.5535,lng:77.2588,img:"https://upload.wikimedia.org/wikipedia/commons/f/fc/LotusDelhi.jpg",desc:"A serene white marble temple shaped like a lotus, open to all religions for meditation.",type:"tourist"},

{name:"Indian Accent",lat:28.6000,lng:77.2300,img:"https://source.unsplash.com/400x300/?restaurant",desc:"Luxury fine dining restaurant known for modern Indian cuisine and world-class service.",type:"restaurant"},
{name:"Karim's",lat:28.6500,lng:77.2330,img:"https://source.unsplash.com/400x300/?food",desc:"Legendary Mughlai restaurant near Jama Masjid famous for kebabs and curries.",type:"restaurant"},

{name:"Blue Tokai Cafe",lat:28.5500,lng:77.2000,img:"https://source.unsplash.com/400x300/?cafe",desc:"Popular modern cafe known for specialty coffee, cozy vibes, and great ambience.",type:"cafe"},
{name:"Cafe Lota",lat:28.5930,lng:77.2200,img:"https://source.unsplash.com/400x300/?coffee",desc:"Cultural cafe serving regional Indian dishes with artistic presentation.",type:"cafe"}
];

// 🧠 DISTANCE
function getDistance(a,b,c,d){
const R=6371;
let dLat=(c-a)*Math.PI/180;
let dLon=(d-b)*Math.PI/180;
let x=Math.sin(dLat/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

// 🚇 METRO
function findNearestMetro(lat,lng){
let nearest=null,min=Infinity;
metros.forEach(m=>{
let d=getDistance(lat,lng,m.lat,m.lng);
if(d<min){min=d;nearest={...m,dist:d};}
});
return nearest;
}

// 🚇 ROUTE DESCRIPTION (IMPROVED)
function getMetroRoute(from,to){
if(!from||!to) return "...";
if(from.name===to.name) return `Direct metro from ${from.name}`;
if(from.line===to.line) return `Take ${from.line} line directly from ${from.name} to ${to.name}`;
return `Take metro from ${from.name} → change at Rajiv Chowk → reach ${to.name}`;
}

// 📍 LOCATION
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
userLat=pos.coords.latitude;
userLng=pos.coords.longitude;
userMetro=findNearestMetro(userLat,userLng);
document.getElementById("topDistance").innerText="📍 Location detected";
render();
});
}
window.onload=getLocation;

// MAP
const map=L.map('map').setView([28.61,77.20],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let markers=[];

// RENDER
function render(){
let cards=document.getElementById("cards");
cards.innerHTML="";
markers.forEach(m=>map.removeLayer(m));
markers=[];

let search=document.getElementById("search").value.toLowerCase();
let filter=document.getElementById("filter").value;

places.filter(p=>{
let matchName=p.name.toLowerCase().includes(search);
let matchType=(filter==="all"||p.type===filter);
return matchName&&matchType;
})
.forEach(p=>{

let dist=userLat?getDistance(userLat,userLng,p.lat,p.lng):null;
let metro=findNearestMetro(p.lat,p.lng);
let route=userMetro?getMetroRoute(userMetro,metro):"...";

let hotelLink=`https://www.google.com/search?q=hotels+near+${p.name}`;
let restaurantLink=`https://www.google.com/search?q=restaurants+near+${p.name}`;
let cafeLink=`https://www.google.com/search?q=cafes+near+${p.name}`;
let directionLink=`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`;

let m=L.marker([p.lat,p.lng]).addTo(map);
markers.push(m);

cards.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-content">

<h3>${p.name}</h3>
<p><b>${dist?dist.toFixed(1)+' km away':'...'}</b></p>

<p>🚇 ${metro.name} (${metro.dist.toFixed(1)} km)</p>
<p>🧭 ${route}</p>

<p class="desc">${p.desc}</p>

<button onclick="window.open('${hotelLink}')">🏨 Hotels</button>
<button onclick="window.open('${restaurantLink}')">🍽️ Food</button>
<button onclick="window.open('${cafeLink}')">☕ Cafe</button>
<button onclick="window.open('${directionLink}')">🧭 Directions</button>

</div>
</div>`;
});
}

document.getElementById("search").addEventListener("input",render);
document.getElementById("filter").addEventListener("change",render);

// HEADER SHRINK
window.addEventListener("scroll",()=>{
const header=document.querySelector("header");
if(window.scrollY>50){header.classList.add("shrink");}
else{header.classList.remove("shrink");}
});
</script>

</body>
</html>
