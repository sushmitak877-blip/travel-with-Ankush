<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delhi Smart Guide Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins, Arial;}
body{background:#f5f7fa;}
header{background:linear-gradient(135deg,#1e3c72,#2a5298);color:white;text-align:center;padding:18px;}
header h1{font-size:22px;}
.controls{background:white;padding:10px;text-align:center;position:sticky;top:0;z-index:999;box-shadow:0 2px 5px rgba(0,0,0,0.1);} 
input,select{padding:10px;margin:5px;width:90%;max-width:250px;border-radius:8px;border:1px solid #ccc;}
button{padding:10px 12px;border:none;background:#2a5298;color:white;border-radius:8px;cursor:pointer;margin:5px;}
button:hover{background:#1e3c72;}
#map{height:350px;border-radius:10px;margin:10px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:15px;padding:15px;}
.card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.1);transition:0.3s;}
.card:hover{transform:translateY(-5px);} 
.card img{width:100%;height:160px;object-fit:cover;}
.card-content{padding:10px;}
.topbar{padding:10px;}
</style>
</head>

<body>

<div class="topbar">
<span style="cursor:pointer;color:#007bff;font-weight:600;" onclick="goBack()">⬅ Back</span>
</div>

<header>
<h1>Delhi Smart Tourist Guide</h1>
<p id="topDistance">📍 Detecting your location...</p>
</header>

<div class="controls">
<input type="text" id="search" placeholder="Search place...">
<select id="filter">
<option value="all">All Distances</option>
<option value="5">Within 5 km</option>
<option value="15">Within 15 km</option>
<option value="30">Within 30 km</option>
<option value="50">Within 50 km</option>
</select>
<select id="category">
<option value="all">All Types</option>
<option value="place">🏛️ Places</option>
<option value="food">🍔 Food</option>
<option value="fun">🎢 Fun</option>
</select>
<button onclick="getLocation()">📍 Refresh Location</button>
</div>

<div id="map"></div>
<div class="cards" id="cards"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

function goBack(){ window.history.back(); }

let userLat=null,userLng=null;

const places=[
{name:"India Gate",lat:28.6129,lng:77.2295,metro:"Central Secretariat",cat:"place",img:"https://upload.wikimedia.org/wikipedia/commons/d/da/India_Gate_in_New_Delhi_03-2016.jpg",desc:"War memorial honoring Indian soldiers."},
{name:"Red Fort",lat:28.6562,lng:77.2410,metro:"Lal Qila",cat:"place",img:"https://upload.wikimedia.org/wikipedia/commons/4/47/Red_Fort_in_New_Delhi_03-2016.jpg",desc:"Historic Mughal fort."},
{name:"Qutub Minar",lat:28.5245,lng:77.1855,metro:"Qutub Minar",cat:"place",img:"https://upload.wikimedia.org/wikipedia/commons/9/9d/Qutub_Minar_2011.jpg",desc:"Tall UNESCO minaret."},
{name:"Lotus Temple",lat:28.5535,lng:77.2588,metro:"Kalkaji",cat:"place",img:"https://upload.wikimedia.org/wikipedia/commons/4/4f/Lotus_Temple_New_Delhi.jpg",desc:"Peaceful lotus temple."},
{name:"Connaught Place",lat:28.6315,lng:77.2167,metro:"Rajiv Chowk",cat:"fun",img:"https://upload.wikimedia.org/wikipedia/commons/4/4d/Connaught_Place.jpg",desc:"City center & nightlife."},
{name:"Chandni Chowk",lat:28.6560,lng:77.2300,metro:"Chandni Chowk",cat:"food",img:"https://upload.wikimedia.org/wikipedia/commons/1/1e/Chandni_Chowk.jpg",desc:"Famous food street."},
{name:"Akshardham Temple",lat:28.6127,lng:77.2773,metro:"Akshardham",cat:"place",img:"https://upload.wikimedia.org/wikipedia/commons/6/6e/Akshardham_Temple.jpg",desc:"Massive spiritual complex."},
{name:"Humayun's Tomb",lat:28.5933,lng:77.2507,metro:"JLN Stadium",cat:"place",img:"https://upload.wikimedia.org/wikipedia/commons/a/a5/Humayun%27s_Tomb.jpg",desc:"Beautiful Mughal tomb."},
{name:"Jama Masjid",lat:28.6507,lng:77.2334,metro:"Jama Masjid",cat:"place",img:"https://upload.wikimedia.org/wikipedia/commons/6/6b/Jama_Masjid.jpg",desc:"India’s largest mosque."},
{name:"Rashtrapati Bhavan",lat:28.6143,lng:77.1995,metro:"Central Secretariat",cat:"place",img:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Rashtrapati_Bhavan.jpg",desc:"President house."},
{name:"Raj Ghat",lat:28.6415,lng:77.2486,metro:"Delhi Gate",cat:"place",img:"https://upload.wikimedia.org/wikipedia/commons/1/1c/Raj_Ghat.jpg",desc:"Gandhi memorial."},
{name:"Purana Qila",lat:28.6091,lng:77.2437,metro:"Pragati Maidan",cat:"place",img:"https://upload.wikimedia.org/wikipedia/commons/f/f5/Purana_Qila.jpg",desc:"Ancient fort."},
{name:"Lodhi Garden",lat:28.5931,lng:77.2197,metro:"Jor Bagh",cat:"place",img:"https://upload.wikimedia.org/wikipedia/commons/3/32/Lodhi_Garden.jpg",desc:"Green park."},
{name:"Hauz Khas Village",lat:28.5494,lng:77.2001,metro:"Hauz Khas",cat:"fun",img:"https://upload.wikimedia.org/wikipedia/commons/8/8b/Hauz_Khas.jpg",desc:"Nightlife hub."},
{name:"Dilli Haat",lat:28.5733,lng:77.2070,metro:"INA",cat:"food",img:"https://upload.wikimedia.org/wikipedia/commons/6/6f/Dilli_Haat.jpg",desc:"Food & crafts."},
{name:"Sarojini Nagar Market",lat:28.5750,lng:77.1960,metro:"Sarojini Nagar",cat:"fun",img:"https://upload.wikimedia.org/wikipedia/commons/2/24/Sarojini_Market.jpg",desc:"Budget shopping."},
{name:"Adventure Island",lat:28.7230,lng:77.1125,metro:"Rithala",cat:"fun",img:"https://upload.wikimedia.org/wikipedia/commons/5/57/Adventure_Island.jpg",desc:"Amusement park."},
{name:"Delhi Zoo",lat:28.6030,lng:77.2470,metro:"Pragati Maidan",cat:"fun",img:"https://upload.wikimedia.org/wikipedia/commons/7/73/Delhi_Zoo.jpg",desc:"Wildlife park."},
{name:"Delhi Zoo",lat:28.6030,lng:77.2470,metro:"Pragati Maidan",cat:"fun",img:"https://upload.wikimedia.org/wikipedia/commons/7/73/Delhi_Zoo.jpg",desc:"Wildlife park."}
];

const map=L.map('map').setView([28.61,77.20],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
setTimeout(()=>map.invalidateSize(),500);

let markers=[];

function getDistance(a,b,c,d){
const R=6371;
let dLat=(c-a)*Math.PI/180;
let dLon=(d-b)*Math.PI/180;
let x=Math.sin(dLat/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
userLat=pos.coords.latitude;
userLng=pos.coords.longitude;
document.getElementById("topDistance").innerText="📍 Showing distances from your location";
render();
});
}

// AUTO LOAD LOCATION
window.onload=getLocation;

function render(){
const cards=document.getElementById("cards");
cards.innerHTML="";

let search=document.getElementById("search").value.toLowerCase();
let filter=document.getElementById("filter").value;
let category=document.getElementById("category").value;

let filtered=places.map(p=>{
let dist=userLat?getDistance(userLat,userLng,p.lat,p.lng):null;
return {...p,dist};
});

filtered=filtered.filter(p=>
p.name.toLowerCase().includes(search) &&
(filter==="all" || !p.dist || p.dist<=filter) &&
(category==="all" || p.cat===category)
);

markers.forEach(m=>map.removeLayer(m));
markers=[];

filtered.forEach(p=>{
let m=L.marker([p.lat,p.lng]).addTo(map);
markers.push(m);

let hotelLink=`https://www.google.com/search?q=hotels+near+${p.name}`;

cards.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<p><b>${p.dist? p.dist.toFixed(1)+' km away':'Detecting...'}</b></p>
<p>🚇 ${p.metro}</p>
<p>${p.desc}</p>
<button onclick="window.open('${hotelLink}')">🏨 Nearby Hotels</button>
</div>
</div>`;
});
}

document.getElementById("search").addEventListener("input",render);
document.getElementById("filter").addEventListener("change",render);
document.getElementById("category").addEventListener("change",render);

render();

</script>

</body>
</html>
