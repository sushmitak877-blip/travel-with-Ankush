];
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
let userMarker;

/* ---------- MAP ---------- */
const map = L.map('map').setView([31.1048,77.1734],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let markers = [];

function updateMap(filtered) {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    filtered.forEach(p => {
        let marker = L.marker([p.lat,p.lng])
        .addTo(map)
        .bindPopup(`<b>${p.name}</b>`);
        markers.push(marker);
    });
}

/* ---------- LOCATION ---------- */
function getLocation() {
    navigator.geolocation.getCurrentPosition(pos => {
        let lat = pos.coords.latitude;
        let lng = pos.coords.longitude;
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.marker([lat,lng])
        .addTo(map)
        .bindPopup("📍 You are here")
        .openPopup();
        map.setView([lat,lng],13);
    });
}

/* ---------- RENDER ---------- */
const cards = document.getElementById("cards");

function render() {
    cards.innerHTML = "";
    let search = document.getElementById("search").value.toLowerCase();
    let filter = document.getElementById("filter").value;
    let filtered = places.filter(p =>
        p.name.toLowerCase().includes(search) &&
        (filter==="all" || p.distance <= filter)
    );

    filtered.forEach(p => {
        cards.innerHTML += `
        <div class="card">
            <img src="${p.img}">
            <div class="card-content">
                <h3>${p.name}</h3>
                <p><b>Distance:</b> ${p.distance} km</p>
                <p><b>Description:</b> ${p.desc}</p>
                <p>🕒 ${p.bestTime}</p>
                <p>⏰ ${p.timing}</p>
                <p>🎟️ ${p.fee}</p>
                <button onclick="toggleFav('${p.name}')">
                    ${favorites.includes(p.name) ? "❤️" : "🤍"}
                </button>
                <button onclick="navigateTo(${p.lat},${p.lng})">
                    🧭 Route
                </button>
                <button onclick="window.open('${p.hotels}', '_blank')">🏨 Nearby Hotels</button>
            </div>
        </div>`;
    });

    updateMap(filtered);
}

/* ---------- FUNCTIONS ---------- */
function toggleFav(name) {
    favorites = favorites.includes(name)
        ? favorites.filter(f => f !== name)
        : [...favorites, name];
    localStorage.setItem("favorites", JSON.stringify(favorites));
    render();
}

function navigateTo(lat,lng) {
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`);
}

/* ---------- EVENTS ---------- */
document.getElementById("search").addEventListener("input", render);
document.getElementById("filter").addEventListener("change", render);

render();
</script>
